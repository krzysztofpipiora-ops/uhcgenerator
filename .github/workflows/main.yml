name: Build SpeedUHCWorldGen

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -B --no-transfer-progress

      - name: Upload Artifact (Plugin JAR)
        uses: actions/upload-artifact@v4
        with:
          name: SpeedUHCWorldGen
          path: target/SpeedUHCWorldGen-*.jar
          if-no-files-found: error
          retention-days: 30

      - name: Release (jeśli tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/SpeedUHCWorldGen-*.jar
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
